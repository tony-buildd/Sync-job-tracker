commands:
  install: npm install
  build: npm run build
  test: npm test
  lint: npm run lint
  typecheck: npx tsc --noEmit
  build-extension: cd extension && npm run build

services:
  nextjs:
    start: npm run dev
    stop: lsof -ti :3000 | xargs kill
    healthcheck: curl -sf http://localhost:3000
    port: 3000
    depends_on: []

  convex:
    start: npx convex dev
    stop: lsof -ti :3210 | xargs kill
    healthcheck: echo "Convex dev connects to hosted backend"
    port: 3210
    depends_on: []
